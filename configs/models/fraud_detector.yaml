# Model definition for fraud detection
# To add a new model, create a new YAML file in this directory following this template.

model_name: "fraud_detector"
display_name: "Fraud Detection"
description: "Credit card transaction fraud detection model"
task_type: "classification"

algorithm:
  class: "sklearn.ensemble.RandomForestClassifier"
  default_params:
    n_estimators: 100
    random_state: 42
    n_jobs: -1

pipeline_steps:
  - name: "scaler"
    class: "sklearn.preprocessing.StandardScaler"

features:
  columns:
    - "hour_of_day"
    - "day_of_week"
    - "is_weekend"
    - "transaction_count_24h"
    - "avg_amount_30d"
    - "amount"
    - "merchant_category_encoded"
    - "payment_method_encoded"
  target: "label"

metrics:
  - "accuracy"
  - "precision"
  - "recall"
  - "f1_score"

mlflow:
  experiment_name: "fraud_detection"

serving:
  confidence_threshold: 0.5

# Feature store integration — schema and labeling config for training from feature store
feature_store:
  feature_groups:
    - transaction_features
    - aggregated_features
  schema:
    transaction_features:
      - hour_of_day
      - day_of_week
      - is_weekend
      - amount
      - merchant_category_encoded
      - payment_method_encoded
    aggregated_features:
      - transaction_count_24h
      - avg_amount_30d
  labeling:
    strategy: "rule_based"
    threshold: 0.65

# Mapping from Beam pipeline output fields to training feature columns.
# Used by assemble_training_data to build training CSV from Beam JSON-lines.
beam_mapping:
  # Per-record feature fields (from Beam FeatureExtraction output)
  per_record_fields:
    hour_of_day: "hour_of_day"
    day_of_week: "day_of_week"
    amount: "amount"

  # Aggregated feature fields (from Beam AggregateFeatures output, keyed by user_id)
  aggregated_fields:
    transaction_count_24h:
      source_field: "record_count"
    avg_amount_30d:
      source_field: "avg_amount"

  # Columns requiring transformation before training
  transforms:
    is_weekend:
      type: "bool_to_int"
      source_field: "is_weekend"
    merchant_category_encoded:
      type: "hash_encode"
      source_field: "merchant_category"
      modulo: 100
    payment_method_encoded:
      type: "hash_encode"
      source_field: "payment_method"
      modulo: 10

validation:
  test_input:
    hour_of_day: 12
    day_of_week: 1
    is_weekend: false
    transaction_count_24h: 5
    avg_amount_30d: 100.0
    amount: 50.0
    merchant_category_encoded: 1
    payment_method_encoded: 1
