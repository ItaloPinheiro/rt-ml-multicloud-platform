# =============================================================================
# Model Evaluation Gate Job
# =============================================================================
# Compares the latest registered model against the current production champion.
# Promotes only if the challenger meets the minimum accuracy threshold AND
# beats the champion on accuracy and F1 score.
#
# Run AFTER the training job completes:
#   kubectl apply -f evaluation-job.yaml -n ml-pipeline
#
# Check the result:
#   kubectl logs job/model-evaluation -n ml-pipeline
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: model-evaluation
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: model-evaluation
    app.kubernetes.io/component: evaluation
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-evaluation
        app.kubernetes.io/component: evaluation
    spec:
      restartPolicy: Never
      containers:
        - name: evaluate
          image: ml-pipeline/api:latest
          command: ["python", "-m", "src.models.evaluation.evaluate_and_promote"]
          args:
            - "--mlflow-uri=http://mlflow-service:5000"
            - "--model-name=fraud_detector"
            - "--min-accuracy=0.80"
          envFrom:
            - configMapRef:
                name: ml-pipeline-config
            - secretRef:
                name: ml-pipeline-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
