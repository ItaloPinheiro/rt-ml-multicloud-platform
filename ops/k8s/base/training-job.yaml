# =============================================================================
# Model Training Job
# =============================================================================
# Runs training inside the cluster using data from S3.
# The init container downloads the dataset, and the training container
# registers the model in MLflow WITHOUT auto-promoting.
# Promotion is handled by the evaluation gate (evaluation-job.yaml).
#
# Usage:
#   kubectl apply -f training-job.yaml -n ml-pipeline
#   kubectl create job training-$(date +%s) --from=job/model-training -n ml-pipeline
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: model-training
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: model-training
    app.kubernetes.io/component: training
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-training
        app.kubernetes.io/component: training
    spec:
      restartPolicy: Never
      initContainers:
        - name: download-data
          image: amazon/aws-cli:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Downloading training data from S3..."
              aws s3 cp "s3://${TRAINING_DATA_BUCKET}/datasets/fraud_detection.csv" /data/fraud_detection.csv
              echo "Download complete. File size: $(wc -c < /data/fraud_detection.csv) bytes"
          env:
            - name: TRAINING_DATA_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ml-pipeline-config
                  key: TRAINING_DATA_BUCKET
                  optional: true
          volumeMounts:
            - name: training-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      containers:
        - name: train
          image: ml-pipeline/api:latest
          command: ["python", "-m", "src.models.training.train"]
          args:
            - "--data-path=/data/fraud_detection.csv"
            - "--mlflow-uri=http://mlflow-service:5000"
            - "--experiment=fraud_detection"
            - "--model-name=fraud_detector"
            - "--n-estimators=100"
          envFrom:
            - configMapRef:
                name: ml-pipeline-config
            - secretRef:
                name: ml-pipeline-secrets
          volumeMounts:
            - name: training-data
              mountPath: /data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: training-data
          emptyDir: {}
