apiVersion: batch/v1
kind: Job
metadata:
  name: beam-ingestion
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: beam-ingestion
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beam-ingestion
        app.kubernetes.io/component: ingestion
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: beam-runner
        image: ghcr.io/italopinheiro/rt-ml-multicloud-platform/beam:main
        imagePullPolicy: Always
        command: ["python", "/app/scripts/demo/demo-aws/ingest_kinesis_s3.py"]
        args:
        - "--stream-name=$(KINESIS_STREAM_NAME)"
        - "--s3-bucket=$(TRAINING_DATA_BUCKET)"
        - "--region=$(AWS_DEFAULT_REGION)"
        - "--output-prefix=features"
        - "--runner=DirectRunner"
        - "--initial-position=TRIM_HORIZON"
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: KINESIS_STREAM_NAME
          valueFrom:
            configMapKeyRef:
              name: ml-pipeline-config
              key: KINESIS_STREAM_NAME
        - name: AWS_DEFAULT_REGION
          valueFrom:
            configMapKeyRef:
              name: ml-pipeline-config
              key: AWS_DEFAULT_REGION
        - name: TRAINING_DATA_BUCKET
          valueFrom:
            configMapKeyRef:
              name: ml-pipeline-config
              key: TRAINING_DATA_BUCKET
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
