apiVersion: batch/v1
kind: Job
metadata:
  name: model-evaluation
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: model-evaluation
    app.kubernetes.io/component: evaluation
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-evaluation
        app.kubernetes.io/component: evaluation
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: evaluate
        image: ghcr.io/italopinheiro/rt-ml-multicloud-platform/api:main
        imagePullPolicy: Always
        command: ["python", "-m", "src.models.evaluation.evaluate_and_promote"]
        args:
        - "--mlflow-uri=http://mlflow-service:5000"
        - "--model-name=fraud_detector"
        - "--min-accuracy=0.80"
        envFrom:
        - configMapRef:
            name: ml-pipeline-config
        - secretRef:
            name: ml-pipeline-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
