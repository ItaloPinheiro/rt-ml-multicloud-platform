apiVersion: batch/v1
kind: Job
metadata:
  name: materialize-training
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: materialize-training
    app.kubernetes.io/component: data-processing
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: materialize-training
        app.kubernetes.io/component: data-processing
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: materialize
        image: ghcr.io/italopinheiro/rt-ml-multicloud-platform/beam:main
        imagePullPolicy: Always
        command: ["python", "-m", "src.feature_engineering.assemble_training_data"]
        args:
        - "--source=feature_store"
        - "--output-format=parquet"
        - "--output-path=s3://$(TRAINING_DATA_BUCKET)/datasets/fraud_detection.parquet"
        - "--model-type=fraud_detector"
        - "--labeling-strategy=rule_based"
        env:
        - name: PYTHONPATH
          value: "/app"
        envFrom:
        - configMapRef:
            name: ml-pipeline-config
        - secretRef:
            name: ml-pipeline-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
