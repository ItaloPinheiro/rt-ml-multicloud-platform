apiVersion: batch/v1
kind: Job
metadata:
  name: kinesis-producer
  namespace: ml-pipeline
  labels:
    app.kubernetes.io/name: kinesis-producer
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ml-pipeline-platform
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kinesis-producer
        app.kubernetes.io/component: ingestion
    spec:
      restartPolicy: Never
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: producer
        image: ghcr.io/italopinheiro/rt-ml-multicloud-platform/beam:main
        imagePullPolicy: Always
        command: ["python", "/app/scripts/data_generation/publish_kinesis_events.py"]
        args:
        - "--stream-name=$(KINESIS_STREAM_NAME)"
        - "--region=$(AWS_DEFAULT_REGION)"
        - "--events-per-second=$(EVENTS_PER_SECOND)"
        - "--total-events=$(TOTAL_EVENTS)"
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: KINESIS_STREAM_NAME
          valueFrom:
            configMapKeyRef:
              name: ml-pipeline-config
              key: KINESIS_STREAM_NAME
        - name: AWS_DEFAULT_REGION
          valueFrom:
            configMapKeyRef:
              name: ml-pipeline-config
              key: AWS_DEFAULT_REGION
        - name: EVENTS_PER_SECOND
          value: "0"
        - name: TOTAL_EVENTS
          value: "100"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
